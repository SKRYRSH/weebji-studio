<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menu — Weebji Studio</title>
<link rel="preconnect" href="https://nmhxrathmbyntpsihmqa.supabase.co" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#faf6f0; --card:#ffffff; --ink:#2b2118; --muted:#8a7a6a;
    --accent:#b3541e; --accent-deep:#8f3f12; --gold:#c99a3f;
    --line:#eee4d6; --ok:#2e7d4f;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink);
    min-height:100dvh; padding-bottom:110px;
  }
  body[dir="rtl"]{font-family:'Tajawal',sans-serif}
  .serif{font-family:'Fraunces',serif}
  body[dir="rtl"] .serif{font-family:'Tajawal',sans-serif;font-weight:800}

  /* ---------- header ---------- */
  header{
    background:linear-gradient(160deg,#3a2a1c 0%,#241811 60%,#1c120c 100%);
    background-size:cover; background-position:center;
    color:#f6ecdd; padding:26px 20px 22px; position:relative; overflow:hidden;
  }
  header.has-hero{text-shadow:0 1px 8px rgba(0,0,0,.55)}
  header::after{
    content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 85% 15%, rgba(201,154,63,.25), transparent 55%);
    pointer-events:none;
  }
  .head-row{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1}
  .rest-name{font-size:26px; line-height:1.15}
  .tagline{color:#cdb896; font-size:13px; margin-top:5px}
  .lang-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#f6ecdd;
    border-radius:999px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer;
    font-family:'Tajawal','DM Sans',sans-serif; backdrop-filter:blur(4px);
  }
  .table-chip{
    display:inline-flex; align-items:center; gap:6px; margin-top:14px;
    background:rgba(201,154,63,.18); border:1px solid rgba(201,154,63,.45);
    color:#e8c983; font-size:12.5px; font-weight:700; padding:6px 13px; border-radius:999px;
    position:relative; z-index:1;
  }

  /* ---------- category nav ---------- */
  nav{
    position:sticky; top:0; z-index:20; background:rgba(250,246,240,.92);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    display:flex; gap:8px; overflow-x:auto; padding:12px 16px; scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  .cat-pill{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:8px 16px; border-radius:999px; font-size:13.5px; font-weight:500; cursor:pointer;
    transition:all .2s; font-family:inherit;
  }
  .cat-pill.active{background:var(--ink); border-color:var(--ink); color:#f6ecdd; font-weight:700}

  /* ---------- menu ---------- */
  main{padding:6px 16px 20px; max-width:560px; margin:0 auto}
  .cat-title{font-size:20px; margin:26px 4px 12px; display:flex; align-items:center; gap:10px}
  .cat-title::after{content:''; flex:1; height:1px; background:var(--line)}
  .item{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px; display:flex; gap:13px; align-items:center; margin-bottom:10px;
    box-shadow:0 1px 2px rgba(43,33,24,.04);
  }
  .item .emoji{
    flex:0 0 52px; height:52px; border-radius:14px; background:#f6efe4;
    display:grid; place-items:center; font-size:26px;
  }
  .item .photo{
    flex:0 0 74px; width:74px; height:74px; border-radius:14px; object-fit:cover;
    background:#f6efe4; box-shadow:0 2px 6px rgba(43,33,24,.12);
  }
  .item .info{flex:1; min-width:0}
  .item .name{font-weight:700; font-size:15px}
  .item .desc{color:var(--muted); font-size:12.5px; margin-top:3px; line-height:1.4}
  .item .price{color:var(--accent-deep); font-weight:700; font-size:14px; margin-top:6px}
  .price small{font-weight:500; color:var(--muted)}
  .qty{display:flex; align-items:center; gap:10px}
  .qty button{
    width:34px; height:34px; border-radius:11px; border:none; cursor:pointer;
    font-size:19px; font-weight:700; display:grid; place-items:center; transition:transform .1s;
    font-family:inherit;
  }
  .qty button:active{transform:scale(.88)}
  .qty .minus{background:#f1e8da; color:var(--ink)}
  .qty .plus{background:var(--accent); color:#fff; box-shadow:0 3px 8px rgba(179,84,30,.35)}
  .qty .n{min-width:16px; text-align:center; font-weight:700; font-size:15px}
  .qty .n.zero{color:#d8cdbd}

  /* ---------- cart bar ---------- */
  .cart-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    transform:translateY(110%); transition:transform .35s cubic-bezier(.2,.9,.25,1.2);
  }
  .cart-bar.show{transform:translateY(0)}
  .cart-btn{
    width:100%; max-width:528px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-deep)); color:#fff;
    border:none; border-radius:18px; padding:16px 20px; font-size:15.5px; font-weight:700;
    cursor:pointer; box-shadow:0 10px 30px rgba(143,63,18,.4); font-family:inherit;
  }
  .cart-btn .total{font-size:17px}

  /* ---------- sheets / overlays ---------- */
  .overlay{
    position:fixed; inset:0; z-index:40; background:rgba(28,18,12,.55); backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .overlay.show{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--bg);
    border-radius:26px 26px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto; max-height:82dvh; overflow-y:auto;
    transform:translateY(105%); transition:transform .35s cubic-bezier(.2,.9,.25,1);
  }
  .sheet.show{transform:translateY(0)}
  .sheet h2{font-size:20px; margin-bottom:4px}
  .sheet .sub{color:var(--muted); font-size:13px; margin-bottom:16px}
  .line-item{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px dashed var(--line); font-size:14.5px}
  .line-item .li-name{font-weight:500}
  .line-item .li-qty{color:var(--muted); font-size:13px}
  .grand{display:flex; justify-content:space-between; padding:16px 0 6px; font-weight:700; font-size:17px}
  .confirm-btn{
    width:100%; margin-top:14px; background:linear-gradient(135deg,var(--accent),var(--accent-deep)); color:#fff;
    border:none; border-radius:16px; padding:17px; font-size:16px; font-weight:700; cursor:pointer;
    box-shadow:0 8px 24px rgba(143,63,18,.35); font-family:inherit;
  }
  .confirm-btn:disabled{opacity:.6}

  /* ---------- status screen ---------- */
  #statusScreen{
    position:fixed; inset:0; z-index:60; background:var(--bg); display:none;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px;
  }
  #statusScreen.show{display:flex}
  .status-emoji{font-size:64px; animation:float 2.4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .status-title{font-size:24px; margin-top:18px}
  .status-sub{color:var(--muted); font-size:14px; margin-top:8px; max-width:280px; line-height:1.5}
  .steps{display:flex; gap:10px; margin-top:30px}
  .step{width:44px; height:6px; border-radius:99px; background:#e8ddcc; transition:background .4s}
  .step.on{background:var(--accent)}
  .status-total{margin-top:26px; font-size:14px; color:var(--muted)}
  .status-total b{color:var(--ink); font-size:16px}
  .again-btn{
    margin-top:34px; background:none; border:1.5px solid var(--ink); color:var(--ink);
    border-radius:14px; padding:13px 28px; font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit;
  }

  .toast{
    position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-80px); z-index:70;
    background:var(--ink); color:#f6ecdd; padding:12px 22px; border-radius:14px; font-size:14px; font-weight:500;
    transition:transform .35s cubic-bezier(.2,.9,.25,1.2); box-shadow:0 10px 30px rgba(0,0,0,.25); max-width:88vw;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .powered{ text-align:center; color:#c4b6a2; font-size:11.5px; padding:26px 0 10px}
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div>
      <div class="rest-name serif" id="restName">…</div>
      <div class="tagline" id="restTag"></div>
    </div>
    <button class="lang-btn" id="langBtn">عربي</button>
  </div>
  <div class="table-chip">🪑 <span id="tableLabel">Table</span> <b id="tableNo">–</b></div>
</header>

<nav id="catNav"></nav>
<main id="menu"></main>
<div class="powered">Powered by <b>Weebji Studio</b></div>

<div class="cart-bar" id="cartBar">
  <button class="cart-btn" id="cartBtn">
    <span id="cartCount">0 items</span>
    <span class="total"><span id="cartTotal">0.000</span> <span id="curLbl">OMR</span></span>
  </button>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <h2 class="serif" id="sheetTitle">Your order</h2>
  <div class="sub" id="sheetSub">Review before sending to the kitchen</div>
  <div id="sheetLines"></div>
  <div class="grand"><span id="grandLbl">Total</span><span><span id="grandTotal">0.000</span> <span class="curLbl2">OMR</span></span></div>
  <button class="confirm-btn" id="confirmBtn">Place order 🔔</button>
</div>

<div id="statusScreen">
  <div class="status-emoji" id="stEmoji">🧾</div>
  <div class="status-title serif" id="stTitle">Order received!</div>
  <div class="status-sub" id="stSub">The kitchen has your order. Sit back — we'll bring it to you.</div>
  <div class="steps">
    <div class="step on" id="s1"></div><div class="step" id="s2"></div><div class="step" id="s3"></div><div class="step" id="s4"></div>
  </div>
  <div class="status-total" id="stTotal"></div>
  <button class="again-btn" id="againBtn">＋ Order more</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://nmhxrathmbyntpsihmqa.supabase.co';
const SB_KEY='sb_publishable_Sw2TyzTk8QYwXDrZRvu0fw_uGdZ6hwI';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const qs=new URLSearchParams(location.search);
const SLUG=qs.get('r')||'demo';
const TABLE=parseInt(qs.get('t')||'1',10);

let LANG=localStorage.getItem('wjs_lang')||'en';
let REST=null, ITEMS=[], CART={}, ACTIVE_ORDER=null, chan=null;

const T={
  en:{table:'Table',items:n=>`${n} item${n===1?'':'s'} · View order`,order:'Your order',review:'Review before sending to the kitchen',
      total:'Total',place:'Place order 🔔',placing:'Sending…',again:'＋ Order more',
      st:[['🧾','Order received!','The kitchen has your order. Sit back — we\'ll bring it to you.'],
          ['👨‍🍳','Preparing…','Your food is being made fresh right now.'],
          ['✨','Ready!','Your order is ready — it\'s on its way to your table.'],
          ['✅','Enjoy your meal!','Delivered. Thank you for ordering with us.']],
      paid:'Order total',err:'Couldn\'t send order — check connection and try again'},
  ar:{table:'طاولة',items:n=>`${n} ${n===1?'صنف':'أصناف'} · عرض الطلب`,order:'طلبك',review:'راجع طلبك قبل إرساله للمطبخ',
      total:'المجموع',place:'إرسال الطلب 🔔',placing:'جارٍ الإرسال…',again:'＋ اطلب المزيد',
      st:[['🧾','تم استلام الطلب!','وصل طلبك إلى المطبخ. استرخِ — سنحضره إليك.'],
          ['👨‍🍳','جارٍ التحضير…','طعامك يُحضّر طازجاً الآن.'],
          ['✨','جاهز!','طلبك جاهز — في طريقه إلى طاولتك.'],
          ['✅','بالهناء والشفاء!','تم التوصيل. شكراً لطلبك منّا.']],
      paid:'إجمالي الطلب',err:'تعذّر إرسال الطلب — تحقق من الاتصال وحاول مجدداً'}
};
const STATUS_IDX={NEW:0,PREPARING:1,READY:2,DELIVERED:3};

function fmt(n){return Number(n).toFixed(3)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

const CACHE_KEY='wjs_menu_'+SLUG;
async function load(){
  // instant paint from cache, then refresh from network
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_KEY));
    if(c&&c.rest&&c.items){REST=c.rest;ITEMS=c.items;render()}
  }catch(e){}
  // one round trip: restaurant + items embedded
  const {data:rest,error}=await sb.from('restaurants')
    .select('*,menu_items(*)').eq('slug',SLUG).single();
  if(error||!rest){if(!REST)document.getElementById('restName').textContent='Menu not found';return}
  const items=(rest.menu_items||[]).filter(i=>i.available).sort((a,b)=>a.sort-b.sort);
  delete rest.menu_items;
  REST=rest;ITEMS=items;
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({rest,items}))}catch(e){}
  render();
}

function render(){
  const t=T[LANG];
  document.body.dir=LANG==='ar'?'rtl':'ltr';
  document.documentElement.lang=LANG;
  document.getElementById('langBtn').textContent=LANG==='ar'?'English':'عربي';
  document.getElementById('restName').textContent=LANG==='ar'?REST.name_ar:REST.name_en;
  document.getElementById('restTag').textContent=(LANG==='ar'?REST.tagline_ar:REST.tagline_en)||'';
  if(REST.hero_img){
    const h=document.querySelector('header');
    h.classList.add('has-hero');
    h.style.background=`linear-gradient(160deg,rgba(40,28,17,.82) 0%,rgba(28,18,12,.92) 100%),url('img/${REST.hero_img}') center/cover`;
  }
  document.getElementById('tableLabel').textContent=t.table;
  document.getElementById('tableNo').textContent=TABLE;
  document.getElementById('sheetTitle').textContent=t.order;
  document.getElementById('sheetSub').textContent=t.review;
  document.getElementById('grandLbl').textContent=t.total;
  document.getElementById('againBtn').textContent=t.again;
  document.getElementById('curLbl').textContent=REST.currency;
  document.querySelector('.curLbl2').textContent=REST.currency;

  // categories in menu order
  const cats=[];
  ITEMS.forEach(i=>{const c=LANG==='ar'?i.cat_ar:i.cat_en;if(!cats.includes(c))cats.push(c)});
  document.getElementById('catNav').innerHTML=cats.map((c,i)=>
    `<button class="cat-pill${i===0?' active':''}" onclick="jumpCat('${c.replace(/'/g,"\\'")}',this)">${c}</button>`).join('');

  let html='',lastCat='';
  ITEMS.forEach(i=>{
    const cat=LANG==='ar'?i.cat_ar:i.cat_en;
    if(cat!==lastCat){html+=`<div class="cat-title serif" id="cat-${cats.indexOf(cat)}" data-cat="${cat}">${cat}</div>`;lastCat=cat}
    const q=CART[i.id]?.qty||0;
    html+=`<div class="item">
      ${i.img?`<img class="photo" src="img/${i.img}" alt="" loading="lazy">`:`<div class="emoji">${i.emoji||'🍽️'}</div>`}
      <div class="info">
        <div class="name">${LANG==='ar'?i.name_ar:i.name_en}</div>
        <div class="desc">${(LANG==='ar'?i.desc_ar:i.desc_en)||''}</div>
        <div class="price">${fmt(i.price)} <small>${REST.currency}</small></div>
      </div>
      <div class="qty">
        <button class="minus" onclick="chg('${i.id}',-1)">−</button>
        <span class="n${q===0?' zero':''}" id="n-${i.id}">${q}</span>
        <button class="plus" onclick="chg('${i.id}',1)">＋</button>
      </div>
    </div>`;
  });
  document.getElementById('menu').innerHTML=html;
  updateCartBar();
}

function jumpCat(cat,btn){
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=[...document.querySelectorAll('.cat-title')].find(e=>e.dataset.cat===cat);
  if(el)window.scrollTo({top:el.offsetTop-70,behavior:'smooth'});
}

function chg(id,d){
  const item=ITEMS.find(i=>i.id===id);if(!item)return;
  const cur=CART[id]?.qty||0;
  const q=Math.max(0,Math.min(20,cur+d));
  if(q===0)delete CART[id];else CART[id]={item,qty:q};
  const n=document.getElementById('n-'+id);
  n.textContent=q;n.classList.toggle('zero',q===0);
  updateCartBar();
}

function cartTotals(){
  let count=0,total=0;
  Object.values(CART).forEach(({item,qty})=>{count+=qty;total+=qty*Number(item.price)});
  return {count,total};
}

function updateCartBar(){
  const t=T[LANG];
  const {count,total}=cartTotals();
  document.getElementById('cartBar').classList.toggle('show',count>0);
  document.getElementById('cartCount').textContent=t.items(count);
  document.getElementById('cartTotal').textContent=fmt(total);
}

function openSheet(){
  const t=T[LANG];
  const {total}=cartTotals();
  document.getElementById('sheetLines').innerHTML=Object.values(CART).map(({item,qty})=>
    `<div class="line-item">
       <span><span class="li-name">${LANG==='ar'?item.name_ar:item.name_en}</span> <span class="li-qty">×${qty}</span></span>
       <span>${fmt(qty*item.price)}</span>
     </div>`).join('');
  document.getElementById('grandTotal').textContent=fmt(total);
  const btn=document.getElementById('confirmBtn');btn.textContent=t.place;btn.disabled=false;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

async function placeOrder(){
  const t=T[LANG];
  const btn=document.getElementById('confirmBtn');
  btn.disabled=true;btn.textContent=t.placing;
  const {total}=cartTotals();
  const {data:order,error}=await sb.from('orders')
    .insert({restaurant_id:REST.id,table_no:TABLE,status:'NEW',total})
    .select().single();
  if(error||!order){btn.disabled=false;btn.textContent=t.place;toast(t.err);return}
  const lines=Object.values(CART).map(({item,qty})=>({
    order_id:order.id,restaurant_id:REST.id,name_en:item.name_en,name_ar:item.name_ar,qty,price:item.price
  }));
  const {error:e2}=await sb.from('order_items').insert(lines);
  if(e2){btn.disabled=false;btn.textContent=t.place;toast(t.err);return}
  ACTIVE_ORDER=order;CART={};
  closeSheet();showStatus(order.status,total);watchOrder(order.id);
}

function showStatus(status,total){
  const t=T[LANG];
  const idx=STATUS_IDX[status]??0;
  const [emo,title,sub]=t.st[idx];
  document.getElementById('stEmoji').textContent=emo;
  document.getElementById('stTitle').textContent=title;
  document.getElementById('stSub').textContent=sub;
  for(let i=1;i<=4;i++)document.getElementById('s'+i).classList.toggle('on',i<=idx+1);
  document.getElementById('stTotal').innerHTML=`${t.paid}: <b>${fmt(total)} ${REST.currency}</b>`;
  document.getElementById('statusScreen').classList.add('show');
  if(navigator.vibrate)navigator.vibrate(80);
}

function watchOrder(orderId){
  if(chan)sb.removeChannel(chan);
  chan=sb.channel('order-'+orderId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders',filter:`id=eq.${orderId}`},
      payload=>{showStatus(payload.new.status,payload.new.total)})
    .subscribe();
}

document.getElementById('langBtn').onclick=()=>{LANG=LANG==='en'?'ar':'en';localStorage.setItem('wjs_lang',LANG);render();if(ACTIVE_ORDER&&document.getElementById('statusScreen').classList.contains('show'))showStatus(ACTIVE_ORDER.status,ACTIVE_ORDER.total)};
document.getElementById('cartBtn').onclick=openSheet;
document.getElementById('overlay').onclick=closeSheet;
document.getElementById('confirmBtn').onclick=placeOrder;
document.getElementById('againBtn').onclick=()=>{document.getElementById('statusScreen').classList.remove('show');window.scrollTo({top:0})};

load();
</script>
</body>
</html>
