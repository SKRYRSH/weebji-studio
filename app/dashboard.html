<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Orders — Weebji Studio</title>
<meta name="theme-color" content="#12100d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="../vendor/supabase.min.js"></script>
<script>window.supabase||document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js"><\/script>');</script>
<style>
  :root{
    --bg:#12100d; --panel:#1c1915; --panel2:#242019; --ink:#f2ead9; --muted:#9c8f7b;
    --line:#2e2921; --accent:#d97a35; --gold:#c99a3f; --ok:#4caf7d;
    --new:#e05d5d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100dvh}
  .serif{font-family:'Fraunces',serif}
  .mono{font-family:'DM Mono',monospace}

  header{
    padding:20px 18px 16px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--line);
  }
  .brand{font-size:19px}
  .brand small{display:block; color:var(--muted); font-size:11.5px; font-weight:400; font-family:'DM Sans'; margin-top:3px; letter-spacing:.4px}
  .live-dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ok); margin-right:6px; animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* revenue counter */
  .revenue{
    margin:16px 18px 6px; background:linear-gradient(135deg,#2a2216,#1d1811);
    border:1px solid #3d321f; border-radius:20px; padding:18px 20px; position:relative; overflow:hidden;
  }
  .revenue::after{content:''; position:absolute; inset:0; background:radial-gradient(circle at 90% 10%, rgba(201,154,63,.15), transparent 60%)}
  .rev-label{color:var(--gold); font-size:11.5px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase}
  .rev-value{font-size:38px; font-weight:700; margin-top:6px; font-family:'Fraunces',serif}
  .rev-value small{font-size:16px; color:var(--muted); font-family:'DM Sans'; font-weight:500}
  .rev-meta{color:var(--muted); font-size:12.5px; margin-top:4px}

  /* tabs */
  .tabs{display:flex; gap:8px; padding:14px 18px 4px}
  .tab{
    flex:1; text-align:center; padding:10px; border-radius:12px; font-size:13.5px; font-weight:700;
    color:var(--muted); background:var(--panel); border:1px solid var(--line); cursor:pointer; font-family:inherit;
  }
  .tab.active{background:var(--ink); color:var(--bg); border-color:var(--ink)}

  main{padding:12px 18px 40px; max-width:640px; margin:0 auto}

  /* order cards */
  .ocard{
    background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:12px;
    animation:none;
  }
  .ocard.flash{animation:arrive .7s ease}
  @keyframes arrive{0%{transform:scale(.95); box-shadow:0 0 0 3px var(--new)}100%{transform:scale(1); box-shadow:0 0 0 0 transparent}}
  .ohead{display:flex; justify-content:space-between; align-items:center}
  .table-big{font-size:17px; font-weight:700}
  .table-big span{
    display:inline-grid; place-items:center; min-width:38px; height:38px; padding:0 8px;
    background:var(--panel2); border:1px solid var(--line); border-radius:12px; margin-right:9px; font-family:'Fraunces',serif; font-size:18px;
  }
  .badge{font-size:11px; font-weight:700; letter-spacing:1px; padding:6px 12px; border-radius:999px}
  .badge.NEW{background:rgba(224,93,93,.15); color:#ff8b8b; border:1px solid rgba(224,93,93,.4)}
  .badge.PREPARING{background:rgba(217,162,53,.13); color:#ecc069; border:1px solid rgba(217,162,53,.4)}
  .badge.READY{background:rgba(76,175,125,.13); color:#7fd4a8; border:1px solid rgba(76,175,125,.4)}
  .badge.DELIVERED{background:rgba(255,255,255,.07); color:var(--muted); border:1px solid var(--line)}
  .olines{margin-top:12px; border-top:1px dashed var(--line); padding-top:10px}
  .oline{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0; color:#d8cdb8}
  .oline .q{color:var(--gold); font-weight:700; margin-right:8px}
  .ofoot{display:flex; justify-content:space-between; align-items:center; margin-top:12px}
  .ototal{font-weight:700; font-size:15px}
  .ototal small{color:var(--muted); font-weight:500}
  .otime{color:var(--muted); font-size:12px}
  .advance{
    width:100%; margin-top:12px; border:none; border-radius:13px; padding:13px; font-size:14px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:transform .1s;
  }
  .advance:active{transform:scale(.97)}
  .advance.to-PREPARING{background:#d9a235; color:#241b08}
  .advance.to-READY{background:#4caf7d; color:#0b2015}
  .advance.to-DELIVERED{background:var(--ink); color:var(--bg)}
  .empty{text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; line-height:1.7}
  .empty .big{font-size:40px; margin-bottom:8px}

  /* best sellers */
  .bs-row{
    display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; margin-bottom:10px;
  }
  .bs-rank{font-family:'Fraunces',serif; font-size:20px; color:var(--gold); min-width:28px}
  .bs-name{flex:1; font-weight:500; font-size:14.5px}
  .bs-count{color:var(--muted); font-size:13px}
  .bs-bar{height:5px; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--gold)); margin-top:7px}

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-90px); z-index:70;
    background:var(--new); color:#fff; padding:13px 24px; border-radius:14px; font-size:14.5px; font-weight:700;
    transition:transform .4s cubic-bezier(.2,.9,.25,1.3); box-shadow:0 12px 34px rgba(224,93,93,.4);
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  .head-actions{display:flex; align-items:center; gap:10px}
  .icon-btn{
    background:var(--panel); border:1px solid var(--line); color:var(--ink); cursor:pointer;
    width:38px; height:38px; border-radius:12px; font-size:17px; display:grid; place-items:center;
  }
  .bell-btn{
    background:rgba(217,122,53,.14); border:1px solid rgba(217,122,53,.5); color:#ecab74;
    border-radius:12px; padding:0 13px; height:38px; font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit;
    display:none; align-items:center; gap:6px;
  }
  .bell-btn.show{display:flex}

  /* day summary overlay */
  .sum-overlay{
    position:fixed; inset:0; z-index:80; background:rgba(10,8,6,.75); backdrop-filter:blur(4px);
    display:none; place-items:center; padding:22px;
  }
  .sum-overlay.show{display:grid}
  .sum-card{
    width:100%; max-width:400px; background:linear-gradient(165deg,#26201607,#1c1712) , var(--panel);
    border:1px solid #3d321f; border-radius:24px; padding:26px 24px; position:relative; overflow:hidden;
  }
  .sum-card::after{content:''; position:absolute; inset:0; background:radial-gradient(circle at 88% 8%, rgba(201,154,63,.16), transparent 55%); pointer-events:none}
  .sum-label{color:var(--gold); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase}
  .sum-date{color:var(--muted); font-size:12.5px; margin-top:3px}
  .sum-rev{font-family:'Fraunces',serif; font-size:42px; font-weight:700; margin-top:14px}
  .sum-rev small{font-size:16px; color:var(--muted); font-family:'DM Sans'; font-weight:500}
  .sum-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px}
  .sum-stat{background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:14px; padding:12px 14px}
  .sum-stat .v{font-weight:700; font-size:18px}
  .sum-stat .k{color:var(--muted); font-size:11.5px; margin-top:2px}
  .sum-top{margin-top:16px; border-top:1px dashed var(--line); padding-top:13px}
  .sum-top .row{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0; color:#d8cdb8}
  .sum-top .row b{color:var(--gold); margin-right:8px}
  .sum-report{
    width:100%; margin-top:20px; background:rgba(217,122,53,.14); border:1px solid rgba(217,122,53,.5);
    color:#ecab74; border-radius:13px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .sum-close{
    width:100%; margin-top:10px; background:var(--ink); color:var(--bg); border:none; border-radius:13px;
    padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .sum-brand{text-align:center; color:#6e6252; font-size:10.5px; margin-top:12px}

  /* add order modal */
  .add-overlay{
    position:fixed; inset:0; z-index:80; background:rgba(10,8,6,.75); backdrop-filter:blur(4px);
    display:none; align-items:flex-end; justify-content:center;
  }
  .add-overlay.show{display:flex}
  .add-card{
    width:100%; max-width:560px; background:var(--panel); border:1px solid var(--line);
    border-radius:24px 24px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom));
    max-height:84dvh; display:flex; flex-direction:column;
  }
  .add-card h2{font-size:18px; margin-bottom:2px}
  .add-card .sub{color:var(--muted); font-size:12.5px; margin-bottom:12px}
  .add-list{overflow-y:auto; flex:1; min-height:120px; border-top:1px solid var(--line)}
  .ai-row{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px dashed var(--line); font-size:14px}
  .ai-row .nm{flex:1; font-weight:500}
  .ai-row .pr{color:var(--muted); font-size:12.5px; min-width:52px; text-align:right}
  .ai-row .qty{display:flex; align-items:center; gap:9px}
  .ai-row .qty button{
    width:30px; height:30px; border-radius:9px; border:none; cursor:pointer; font-size:17px; font-weight:700;
    display:grid; place-items:center; font-family:inherit;
  }
  .ai-row .minus{background:var(--panel2); color:var(--ink); border:1px solid var(--line)}
  .ai-row .plus{background:var(--accent); color:#fff}
  .ai-row .n{min-width:14px; text-align:center; font-weight:700; font-size:14px}
  .ai-row .n.zero{color:#4d4436}
  .add-total{display:flex; justify-content:space-between; font-weight:700; font-size:16px; padding:13px 2px 4px}
  .add-actions{display:flex; gap:9px; margin-top:10px}
  .add-actions button{
    flex:1; border:none; border-radius:13px; padding:14px 6px; font-size:13.5px; font-weight:700;
    cursor:pointer; font-family:inherit;
  }
  .add-actions .kitchen{background:#d9a235; color:#241b08}
  .add-actions .sale{background:var(--ok); color:#0b2015}
  .add-actions .cancel{flex:0 0 auto; background:var(--panel2); color:var(--muted); border:1px solid var(--line); padding:14px 16px}
  .add-actions button:disabled{opacity:.55}
</style>
</head>
<body>

<header>
  <div class="brand serif" id="brandName">Live Orders
    <small><span class="live-dot"></span>LIVE · Weebji Studio</small>
  </div>
  <div class="head-actions">
    <button class="bell-btn" id="bellBtn">🔔 Daily summary</button>
    <button class="icon-btn" id="addBtn" title="Add counter order">＋</button>
    <button class="icon-btn" id="sumBtn" title="Day summary">📊</button>
    <div class="mono" id="clock" style="color:var(--muted);font-size:13px"></div>
  </div>
</header>

<div class="revenue">
  <div class="rev-label">Today's Revenue</div>
  <div class="rev-value"><span id="revToday">0.000</span> <small>OMR</small></div>
  <div class="rev-meta"><span id="orderCount">0</span> orders today · updates in real time</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="active" onclick="setTab('active',this)">🔥 Active <span id="activeN"></span></button>
  <button class="tab" data-tab="done" onclick="setTab('done',this)">✅ Done</button>
  <button class="tab" data-tab="best" onclick="setTab('best',this)">⭐ Best Sellers</button>
</div>

<main id="board"></main>
<div class="toast" id="toast">🔔 New order — Table 4</div>

<div class="add-overlay" id="addOverlay">
  <div class="add-card">
    <h2 class="serif">Add counter order</h2>
    <div class="sub">Walk-in, takeaway or phone order — keeps your reports complete</div>
    <div class="add-list" id="addList"></div>
    <div class="add-total"><span>Total</span><span><span id="addTotal">0.000</span> <span id="addCur">OMR</span></span></div>
    <div class="add-actions">
      <button class="cancel" onclick="closeAddOrder()">✕</button>
      <button class="kitchen" id="addKitchenBtn">🔔 Send to kitchen</button>
      <button class="sale" id="addSaleBtn">✓ Record sale</button>
    </div>
  </div>
</div>

<div class="sum-overlay" id="sumOverlay">
  <div class="sum-card">
    <div class="sum-label" id="sumName">Day Summary</div>
    <div class="sum-date" id="sumDate"></div>
    <div class="sum-rev"><span id="sumRev">0.000</span> <small id="sumCur">OMR</small></div>
    <div class="sum-grid">
      <div class="sum-stat"><div class="v" id="sumOrders">0</div><div class="k">orders</div></div>
      <div class="sum-stat"><div class="v" id="sumHour">—</div><div class="k">busiest hour</div></div>
    </div>
    <div class="sum-top" id="sumTop"></div>
    <button class="sum-report" id="sumReportBtn">📄 Full report (day / month)</button>
    <button class="sum-close" onclick="document.getElementById('sumOverlay').classList.remove('show')">Close</button>
    <div class="sum-brand">LIVE MENU BY WEEBJI STUDIO</div>
  </div>
</div>

<script>
const SB_URL='https://nmhxrathmbyntpsihmqa.supabase.co';
const SB_KEY='sb_publishable_Sw2TyzTk8QYwXDrZRvu0fw_uGdZ6hwI';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const VAPID_PUBLIC='BHf0wVpg2v65hacqUSQnPdRT5KwNtSVJ2tdjclO9agebbnWao11y6dbtPoDa3Cn6fWkAU1FHfkV12ThGcfyJdik';
const qs=new URLSearchParams(location.search);
const SLUG=qs.get('r')||localStorage.getItem('wjs_slug')||'demo';
localStorage.setItem('wjs_slug',SLUG);
const NEXT={NEW:'PREPARING',PREPARING:'READY',READY:'DELIVERED'};
const NEXT_LABEL={NEW:'Start preparing 👨‍🍳',PREPARING:'Mark ready ✨',READY:'Mark delivered ✅'};

let REST=null, ORDERS=[], ITEMS_BY_ORDER={}, TAB='active', flashIds=new Set();

function fmt(n){return Number(n).toFixed(3)}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString()}

// tiny "ding" without any audio file
// browsers keep AudioContext suspended until the user taps the page once — unlock
// on first interaction, else the new-order ding is silently swallowed
let actx=null;
document.addEventListener('pointerdown',()=>{
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();actx.resume()}catch(e){}
},{once:true});
function ding(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(.001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.3,actx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.9);
    o.start();o.frequency.setValueAtTime(1174,actx.currentTime+.12);o.stop(actx.currentTime+1);
  }catch(e){}
}

async function load(){
  const {data:rest}=await sb.from('restaurants').select('*').eq('slug',SLUG).single();
  if(!rest){document.getElementById('board').innerHTML='<div class="empty">Restaurant not found</div>';return}
  REST=rest;
  document.getElementById('brandName').childNodes[0].textContent=rest.name_en+' ';
  await refresh();
  subscribe();
}

async function refresh(){
  const {data:orders}=await sb.from('orders').select('*')
    .eq('restaurant_id',REST.id).gte('created_at',todayStart())
    .order('created_at',{ascending:false});
  ORDERS=orders||[];
  const ids=ORDERS.map(o=>o.id);
  ITEMS_BY_ORDER={};
  if(ids.length){
    const {data:items}=await sb.from('order_items').select('*').in('order_id',ids);
    (items||[]).forEach(it=>{(ITEMS_BY_ORDER[it.order_id]=ITEMS_BY_ORDER[it.order_id]||[]).push(it)});
  }
  render();
  if(PENDING_SUMMARY){PENDING_SUMMARY=false;openSummary()}
}

function subscribe(){
  sb.channel('dash-'+REST.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'orders',filter:`restaurant_id=eq.${REST.id}`},
      async payload=>{
        flashIds.add(payload.new.id);
        toast(`🔔 New order — ${payload.new.table_no===0?'Counter':'Table '+payload.new.table_no}`);
        ding(); if(navigator.vibrate)navigator.vibrate([120,60,120]);
        await refresh();
      })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders',filter:`restaurant_id=eq.${REST.id}`},
      ()=>refresh())
    .subscribe();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200)}

function ago(ts){
  const m=Math.floor((Date.now()-new Date(ts).getTime())/60000);
  if(m<1)return 'just now';
  if(m<60)return m+' min ago';
  return Math.floor(m/60)+'h '+(m%60)+'m ago';
}

function setTab(tab,btn){
  TAB=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  // revenue (count everything except nothing — all placed orders count; "show money")
  const rev=ORDERS.reduce((s,o)=>s+Number(o.total),0);
  animateNumber('revToday',rev);
  document.getElementById('orderCount').textContent=ORDERS.length;
  const active=ORDERS.filter(o=>o.status!=='DELIVERED');
  document.getElementById('activeN').textContent=active.length?`(${active.length})`:'';

  const board=document.getElementById('board');
  if(TAB==='best'){renderBest(board);return}
  const list=TAB==='active'?active:ORDERS.filter(o=>o.status==='DELIVERED');
  if(!list.length){
    board.innerHTML=`<div class="empty"><div class="big">${TAB==='active'?'🪑':'🌙'}</div>${
      TAB==='active'?'No active orders.<br>Scan a table QR and place one — watch it pop here.':'No delivered orders yet today.'}</div>`;
    return;
  }
  board.innerHTML=list.map(o=>{
    const items=(ITEMS_BY_ORDER[o.id]||[]).map(it=>
      `<div class="oline"><span><span class="q">${it.qty}×</span>${it.name_en}</span><span>${fmt(it.qty*it.price)}</span></div>`).join('');
    const nxt=NEXT[o.status];
    const flash=flashIds.has(o.id)?' flash':''; flashIds.delete(o.id);
    return `<div class="ocard${flash}">
      <div class="ohead">
        <div class="table-big"><span>${o.table_no===0?'🛎':o.table_no}</span>${o.table_no===0?'Counter':'Table '+o.table_no}</div>
        <div class="badge ${o.status}">${o.status}</div>
      </div>
      <div class="olines">${items}</div>
      <div class="ofoot">
        <div class="ototal">${fmt(o.total)} <small>${REST.currency}</small></div>
        <div class="otime">${ago(o.created_at)}</div>
      </div>
      ${nxt?`<button class="advance to-${nxt}" onclick="advance('${o.id}','${nxt}')">${NEXT_LABEL[o.status]}</button>`:''}
    </div>`;
  }).join('');
}

function renderBest(board){
  const agg={};
  Object.values(ITEMS_BY_ORDER).flat().forEach(it=>{
    agg[it.name_en]=(agg[it.name_en]||0)+it.qty;
  });
  const rows=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(!rows.length){board.innerHTML='<div class="empty"><div class="big">⭐</div>No sales yet today.<br>Best sellers build themselves — no reports to make.</div>';return}
  const max=rows[0][1];
  board.innerHTML=rows.map(([name,n],i)=>
    `<div class="bs-row">
      <div class="bs-rank">${i+1}</div>
      <div class="bs-name">${name}<div class="bs-bar" style="width:${Math.max(12,(n/max)*100)}%"></div></div>
      <div class="bs-count"><b style="color:var(--ink)">${n}</b> sold</div>
    </div>`).join('');
}

async function advance(id,status){
  const {error}=await sb.from('orders').update({status}).eq('id',id);
  if(error){toast('⚠️ Update failed — try again');return}
  if(navigator.vibrate)navigator.vibrate(40);
  refresh();
}

let revShown=0;
function animateNumber(elId,target){
  const el=document.getElementById(elId);
  const from=revShown; revShown=target;
  const steps=18; let s=0;
  const iv=setInterval(()=>{s++;el.textContent=fmt(from+(target-from)*(s/steps));if(s>=steps)clearInterval(iv)},28);
}

/* ---------- add counter order ---------- */
let MENU=null, ADD_CART={};
async function openAddOrder(){
  document.getElementById('addOverlay').classList.add('show');
  if(!MENU){
    document.getElementById('addList').innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Loading menu…</div>';
    const {data}=await sb.from('menu_items').select('id,name_en,name_ar,price')
      .eq('restaurant_id',REST.id).eq('available',true).order('sort');
    MENU=data||[];
  }
  ADD_CART={};
  renderAddList();
}
function closeAddOrder(){document.getElementById('addOverlay').classList.remove('show')}
function renderAddList(){
  document.getElementById('addCur').textContent=REST.currency;
  document.getElementById('addList').innerHTML=MENU.map(m=>{
    const q=ADD_CART[m.id]?.qty||0;
    return `<div class="ai-row">
      <span class="nm">${m.name_en}</span><span class="pr">${fmt(m.price)}</span>
      <div class="qty">
        <button class="minus" onclick="addChg('${m.id}',-1)">−</button>
        <span class="n${q===0?' zero':''}" id="an-${m.id}">${q}</span>
        <button class="plus" onclick="addChg('${m.id}',1)">＋</button>
      </div>
    </div>`;
  }).join('');
  updateAddTotal();
}
function addChg(id,d){
  const m=MENU.find(x=>x.id===id);if(!m)return;
  const q=Math.max(0,Math.min(30,(ADD_CART[id]?.qty||0)+d));
  if(q===0)delete ADD_CART[id];else ADD_CART[id]={m,qty:q};
  const n=document.getElementById('an-'+id);
  n.textContent=q;n.classList.toggle('zero',q===0);
  updateAddTotal();
}
function addTotals(){return Object.values(ADD_CART).reduce((s,{m,qty})=>s+qty*Number(m.price),0)}
function updateAddTotal(){document.getElementById('addTotal').textContent=fmt(addTotals())}
async function submitAdd(kind){
  const total=addTotals();
  if(total<=0){toast('Add at least one item');return}
  const k=document.getElementById('addKitchenBtn'),s=document.getElementById('addSaleBtn');
  k.disabled=true;s.disabled=true;
  try{
    const {data:order,error}=await sb.from('orders')
      .insert({restaurant_id:REST.id,table_no:0,status:'NEW',total}).select().single();
    if(error||!order)throw new Error(error?.message||'insert failed');
    const lines=Object.values(ADD_CART).map(({m,qty})=>({
      order_id:order.id,restaurant_id:REST.id,name_en:m.name_en,name_ar:m.name_ar,qty,price:m.price
    }));
    const {error:e2}=await sb.from('order_items').insert(lines);
    if(e2)throw new Error(e2.message);
    if(kind==='sale')await sb.from('orders').update({status:'DELIVERED'}).eq('id',order.id);
    closeAddOrder();
    refresh();
  }catch(e){toast('⚠️ Failed — try again')}
  k.disabled=false;s.disabled=false;
}
document.getElementById('addBtn').onclick=openAddOrder;
document.getElementById('addKitchenBtn').onclick=()=>submitAdd('kitchen');
document.getElementById('addSaleBtn').onclick=()=>submitAdd('sale');
document.getElementById('addOverlay').addEventListener('click',e=>{if(e.target.id==='addOverlay')closeAddOrder()});

/* ---------- day summary ---------- */
function busiestHour(){
  const buckets={};
  ORDERS.forEach(o=>{const h=new Date(o.created_at).getHours();buckets[h]=(buckets[h]||0)+1});
  const best=Object.entries(buckets).sort((a,b)=>b[1]-a[1])[0];
  if(!best)return '—';
  const h=parseInt(best[0]);
  const f=x=>{const ap=x>=12?'pm':'am';const v=x%12||12;return v+ap};
  return f(h)+'–'+f((h+1)%24);
}
function openSummary(){
  const rev=ORDERS.reduce((s,o)=>s+Number(o.total),0);
  document.getElementById('sumName').textContent=(REST?REST.name_en:'')+' — Day Summary';
  document.getElementById('sumDate').textContent=new Date().toLocaleDateString([], {weekday:'long',day:'numeric',month:'long'});
  document.getElementById('sumRev').textContent=fmt(rev);
  document.getElementById('sumCur').textContent=REST?REST.currency:'OMR';
  document.getElementById('sumOrders').textContent=ORDERS.length;
  document.getElementById('sumHour').textContent=busiestHour();
  const agg={};
  Object.values(ITEMS_BY_ORDER).flat().forEach(it=>{agg[it.name_en]=(agg[it.name_en]||0)+it.qty});
  const rows=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,3);
  document.getElementById('sumTop').innerHTML=rows.length
    ? rows.map(([n,q],i)=>`<div class="row"><span><b>${i+1}</b>${n}</span><span>×${q}</span></div>`).join('')
    : '<div class="row" style="color:var(--muted)">No sales yet today</div>';
  document.getElementById('sumOverlay').classList.add('show');
}
document.getElementById('sumBtn').onclick=openSummary;
document.getElementById('sumReportBtn').onclick=()=>{location.href=`report.html?r=${encodeURIComponent(SLUG)}&p=day`};

/* ---------- PWA + daily summary push ---------- */
function b64ToU8(s){
  const pad='='.repeat((4-s.length%4)%4);
  const raw=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
let swReg=null;
async function initPWA(){
  if(!('serviceWorker' in navigator))return;
  try{swReg=await navigator.serviceWorker.register('sw.js')}catch(e){return}
  if(!('PushManager' in window)||!('Notification' in window))return;
  const sub=await swReg.pushManager.getSubscription();
  if(!sub&&Notification.permission!=='denied')document.getElementById('bellBtn').classList.add('show');
}
async function enableSummary(){
  const btn=document.getElementById('bellBtn');
  btn.disabled=true;
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){btn.disabled=false;return}
    const sub=await swReg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(VAPID_PUBLIC)});
    const res=await fetch(`${SB_URL}/functions/v1/save-push-sub`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({slug:SLUG,subscription:sub.toJSON()})
    });
    if(!res.ok)throw new Error('save failed');
    btn.classList.remove('show');
    toast('✅ Daily summary ON — every night at 10pm');
  }catch(e){
    btn.disabled=false;
    toast('⚠️ Couldn\'t enable notifications — try again');
  }
}
document.getElementById('bellBtn').onclick=enableSummary;
initPWA();
let PENDING_SUMMARY=qs.get('view')==='summary';

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})},1000);
setInterval(()=>{if(TAB!=='best')render()},60000); // refresh "x min ago"
load();
