<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Report — Weebji Studio</title>
<link rel="preconnect" href="https://nmhxrathmbyntpsihmqa.supabase.co" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="../vendor/supabase.min.js"></script>
<script>window.supabase||document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js"><\/script>');</script>
<style>
  :root{
    --bg:#faf6f0; --card:#ffffff; --ink:#2b2118; --muted:#8a7a6a;
    --accent:#b3541e; --accent-deep:#8f3f12; --gold:#c99a3f; --line:#eee4d6;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);padding:22px 16px 48px}
  .serif{font-family:'Fraunces',serif}
  .wrap{max-width:640px;margin:0 auto}

  .controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .controls .seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .controls .seg button{
    border:none;background:none;padding:10px 18px;font-size:13.5px;font-weight:700;cursor:pointer;
    color:var(--muted);font-family:inherit;
  }
  .controls .seg button.on{background:var(--ink);color:#f6ecdd}
  .controls .act{
    margin-left:auto;display:flex;gap:8px;
  }
  .controls .act button{
    border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 16px;
    font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);
  }
  .controls .act .pdf{background:var(--accent);border-color:var(--accent);color:#fff}

  .sheet{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden}
  .rhead{
    background:linear-gradient(160deg,#3a2a1c,#1c120c);color:#f6ecdd;padding:24px 26px;
  }
  .rhead .rest{font-size:23px}
  .rhead .period{color:#cdb896;font-size:13px;margin-top:5px}
  .rhead .gen{color:#8f7f66;font-size:10.5px;margin-top:10px;letter-spacing:.5px;text-transform:uppercase}

  .hero{padding:26px 26px 6px;text-align:left}
  .hero .lbl{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .hero .val{font-family:'Fraunces',serif;font-size:46px;font-weight:700;margin-top:4px}
  .hero .val small{font-size:17px;color:var(--muted);font-family:'DM Sans';font-weight:500}

  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px 26px}
  .tile{background:#faf6ef;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .tile .v{font-weight:700;font-size:17px}
  .tile .k{color:var(--muted);font-size:11px;margin-top:2px}

  .sec{padding:8px 26px 22px}
  .sec h2{font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .sec h2::after{content:'';flex:1;height:1px;background:var(--line)}

  /* top items — horizontal bars */
  .ti{display:flex;align-items:center;gap:12px;padding:6px 0;font-size:13.5px}
  .ti .rank{color:var(--gold);font-family:'Fraunces',serif;font-size:15px;min-width:20px}
  .ti .nm{flex:0 0 165px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ti .track{flex:1;height:14px;display:flex;align-items:center}
  .ti .bar{height:14px;border-radius:0 4px 4px 0;background:var(--accent);min-width:3px}
  .ti .q{min-width:44px;text-align:right;font-weight:700;font-size:12.5px}

  /* daily revenue chart (month) */
  .chart{display:none}
  .chart.on{display:block}
  .ch-plot{display:flex;align-items:flex-end;gap:2px;height:130px;border-bottom:1.5px solid var(--line);padding-bottom:0}
  .ch-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;position:relative}
  .ch-bar{width:100%;max-width:18px;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px}
  .ch-bar.zero{background:#eadfce}
  .ch-best{position:absolute;top:-17px;font-size:10px;font-weight:700;color:var(--ink);white-space:nowrap}
  .ch-x{display:flex;gap:2px;margin-top:6px}
  .ch-x span{flex:1;text-align:center;font-size:9.5px;color:var(--muted)}
  .ch-cap{color:var(--muted);font-size:11.5px;margin-top:10px}

  .note{padding:0 26px 24px;color:var(--muted);font-size:12px;line-height:1.6}
  .brand{border-top:1px dashed var(--line);padding:14px;text-align:center;font-size:10.5px;color:#b3a591}
  .brand b{color:var(--accent)}
  .empty-msg{padding:30px 26px;color:var(--muted);font-size:14px}

  @media(max-width:480px){
    .tiles{grid-template-columns:repeat(2,1fr)}
    .ti .nm{flex-basis:110px}
  }
  @media print{
    body{background:#fff;padding:0}
    .controls{display:none}
    .sheet{border:none;border-radius:0}
    .wrap{max-width:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="controls">
    <div class="seg">
      <button id="segDay" onclick="setPeriod('day')">Today</button>
      <button id="segMonth" onclick="setPeriod('month')">This Month</button>
    </div>
    <div class="act">
      <button onclick="shareReport()">Share</button>
      <button class="pdf" onclick="window.print()">⤓ Download PDF</button>
    </div>
  </div>

  <div class="sheet" id="sheet">
    <div class="rhead">
      <div class="rest serif" id="rName">…</div>
      <div class="period" id="rPeriod"></div>
      <div class="gen" id="rGen"></div>
    </div>
    <div class="hero">
      <div class="lbl">Total Revenue</div>
      <div class="val"><span id="hRev">0.000</span> <small id="hCur">OMR</small></div>
    </div>
    <div class="tiles" id="tiles"></div>

    <div class="sec chart" id="chartSec">
      <h2 class="serif">Revenue by day</h2>
      <div class="ch-plot" id="chPlot"></div>
      <div class="ch-x" id="chX"></div>
      <div class="ch-cap" id="chCap"></div>
    </div>

    <div class="sec">
      <h2 class="serif">Top items</h2>
      <div id="topItems"></div>
    </div>

    <div class="brand">BUSINESS REPORT · LIVE MENU BY <b>WEEBJI STUDIO</b></div>
  </div>
</div>

<script>
const SB_URL='https://nmhxrathmbyntpsihmqa.supabase.co';
const SB_KEY='sb_publishable_Sw2TyzTk8QYwXDrZRvu0fw_uGdZ6hwI';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const qs=new URLSearchParams(location.search);
const SLUG=qs.get('r')||localStorage.getItem('wjs_slug')||'demo';
let PERIOD=qs.get('p')==='month'?'month':'day';
let REST=null;

const fmt=n=>Number(n).toFixed(3);
const hourLbl=h=>{const ap=h>=12?'pm':'am';const v=h%12||12;return v+ap};

function windowRange(){
  const now=new Date();
  if(PERIOD==='day'){
    const s=new Date(now);s.setHours(0,0,0,0);
    return {start:s, label:now.toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'})};
  }
  const s=new Date(now.getFullYear(),now.getMonth(),1);
  return {start:s, label:now.toLocaleDateString([],{month:'long',year:'numeric'})};
}

async function load(){
  if(!REST){
    const {data:rest}=await sb.from('restaurants').select('*').eq('slug',SLUG).single();
    if(!rest){document.getElementById('rName').textContent='Not found';return}
    REST=rest;
  }
  const {start,label}=windowRange();
  document.getElementById('rName').textContent=REST.name_en;
  document.getElementById('rPeriod').textContent=(PERIOD==='day'?'Daily report — ':'Monthly report — ')+label;
  document.getElementById('rGen').textContent='Generated '+new Date().toLocaleString([],{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  document.getElementById('hCur').textContent=REST.currency;

  const {data:orders}=await sb.from('orders').select('id,total,status,table_no,created_at')
    .eq('restaurant_id',REST.id).gte('created_at',start.toISOString()).order('created_at');
  const O=orders||[];
  let items=[];
  if(O.length){
    const ids=O.map(o=>o.id);
    const {data:it}=await sb.from('order_items').select('name_en,qty,price,order_id').in('order_id',ids);
    items=it||[];
  }
  renderReport(O,items,start);
}

function renderReport(O,items,start){
  const rev=O.reduce((s,o)=>s+Number(o.total),0);
  document.getElementById('hRev').textContent=fmt(rev);

  // tiles
  const avg=O.length?rev/O.length:0;
  const tables=new Set(O.map(o=>o.table_no)).size;
  let tiles='';
  tiles+=tile(O.length,'orders');
  tiles+=tile(fmt(avg),'avg per order');
  if(PERIOD==='day'){
    const hb={};O.forEach(o=>{const h=new Date(o.created_at).getHours();hb[h]=(hb[h]||0)+1});
    const best=Object.entries(hb).sort((a,b)=>b[1]-a[1])[0];
    tiles+=tile(best?hourLbl(+best[0])+'–'+hourLbl((+best[0]+1)%24):'—','busiest hour');
    tiles+=tile(tables,'tables served');
    tiles+=tile(O.filter(o=>o.status==='DELIVERED').length,'delivered');
    const qty=items.reduce((s,i)=>s+i.qty,0);
    tiles+=tile(qty,'items sold');
  }else{
    const db={};O.forEach(o=>{const d=new Date(o.created_at).getDate();db[d]=(db[d]||0)+Number(o.total)});
    const bestD=Object.entries(db).sort((a,b)=>b[1]-a[1])[0];
    const now=new Date();const daysSoFar=Math.min(now.getDate(),31);
    tiles+=tile(fmt(rev/daysSoFar),'avg per day');
    tiles+=tile(bestD?new Date(now.getFullYear(),now.getMonth(),+bestD[0]).toLocaleDateString([],{day:'numeric',month:'short'}):'—','best day');
    tiles+=tile(new Set(O.map(o=>new Date(o.created_at).getDate())).size,'active days');
    tiles+=tile(items.reduce((s,i)=>s+i.qty,0),'items sold');
  }
  document.getElementById('tiles').innerHTML=tiles;

  // month chart
  const chartSec=document.getElementById('chartSec');
  chartSec.classList.toggle('on',PERIOD==='month');
  if(PERIOD==='month'){
    const now=new Date();
    const days=now.getDate(); // month-to-date
    const db={};O.forEach(o=>{const d=new Date(o.created_at).getDate();db[d]=(db[d]||0)+Number(o.total)});
    const max=Math.max(1,...Object.values(db));
    let plot='',x='';
    for(let d=1;d<=days;d++){
      const v=db[d]||0;
      const h=Math.max(2,Math.round((v/max)*118));
      const isMax=v===max&&v>0;
      plot+=`<div class="ch-col">${isMax?`<div class="ch-best">${fmt(v)}</div>`:''}<div class="ch-bar${v===0?' zero':''}" style="height:${h}px" title="${d}: ${fmt(v)} ${REST.currency}"></div></div>`;
      x+=`<span>${(d===1||d%5===0||d===days)?d:''}</span>`;
    }
    document.getElementById('chPlot').innerHTML=plot;
    document.getElementById('chX').innerHTML=x;
    document.getElementById('chCap').textContent=`Revenue per day, ${REST.currency} — best day labelled`;
  }

  // top items
  const agg={};
  items.forEach(i=>{agg[i.name_en]=agg[i.name_en]||{q:0,rev:0};agg[i.name_en].q+=i.qty;agg[i.name_en].rev+=i.qty*Number(i.price)});
  const rows=Object.entries(agg).sort((a,b)=>b[1].q-a[1].q).slice(0,10);
  const maxQ=rows.length?rows[0][1].q:1;
  document.getElementById('topItems').innerHTML=rows.length
    ? rows.map(([n,d],i)=>`<div class="ti"><span class="rank">${i+1}</span><span class="nm">${n}</span><div class="track"><div class="bar" style="width:${Math.max(3,(d.q/maxQ)*100)}%"></div></div><span class="q">×${d.q}</span></div>`).join('')
    : '<div class="empty-msg">No orders in this period yet.</div>';
}

function tile(v,k){return `<div class="tile"><div class="v">${v}</div><div class="k">${k}</div></div>`}

function setPeriod(p){
  PERIOD=p;
  document.getElementById('segDay').classList.toggle('on',p==='day');
  document.getElementById('segMonth').classList.toggle('on',p==='month');
  load();
}

async function shareReport(){
  const url=location.origin+location.pathname+`?r=${SLUG}&p=${PERIOD}`;
  const title=(REST?REST.name_en:'')+' — business report';
  if(navigator.share){try{await navigator.share({title,url})}catch(e){}}
  else{try{await navigator.clipboard.writeText(url);alert('Link copied')}catch(e){}}
}

document.getElementById(PERIOD==='day'?'segDay':'segMonth').classList.add('on');
load();
</script>
</body>
</html>
